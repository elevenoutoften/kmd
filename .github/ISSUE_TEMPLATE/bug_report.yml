name: Bug report
description: Report something in kmd that is broken or surprising.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve kmd.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include a small Markdown sample when possible.
      placeholder: |
        1. Open this Markdown file...
        2. Click...
        3. See...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: kmd version
      placeholder: v0.1.0
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows
        - macOS
        - Other
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Do not include private documents, signing keys, or exploit details.

name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || github.run_id }}
  cancel-in-progress: true

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            family: macos
            runner: macos-15
            args: "--target aarch64-apple-darwin"
            rustTargets: "aarch64-apple-darwin"
            portableName: macos-arm64
          - name: macOS Intel
            family: macos
            runner: macos-15-intel
            args: "--target x86_64-apple-darwin"
            rustTargets: "x86_64-apple-darwin"
            portableName: macos-x64
          - name: Windows
            family: windows
            runner: windows-latest
            args: ""
            rustTargets: ""
            portableName: windows-x64

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Read package version
        id: package
        shell: bash
        run: node -e "console.log('version=' + require('./package.json').version)" >> "$GITHUB_OUTPUT"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTargets || '' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate macOS signing secrets
        if: matrix.family == 'macos'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          missing=()
          [ -n "$APPLE_CERTIFICATE" ] || missing+=("APPLE_CERTIFICATE")
          [ -n "$APPLE_CERTIFICATE_PASSWORD" ] || missing+=("APPLE_CERTIFICATE_PASSWORD")
          [ -n "$APPLE_ID" ] || missing+=("APPLE_ID")
          [ -n "$APPLE_PASSWORD" ] || missing+=("APPLE_PASSWORD")
          [ -n "$APPLE_TEAM_ID" ] || missing+=("APPLE_TEAM_ID")

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required macOS signing/notarization secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Import Apple Developer ID certificate
        if: matrix.family == 'macos'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          certificate_path="$RUNNER_TEMP/developer-id-application.p12"
          keychain_path="$RUNNER_TEMP/kmd-signing.keychain-db"
          keychain_password="$(openssl rand -base64 32)"

          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" \
            -k "$keychain_path" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productsign
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -s "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"

          identity="$(security find-identity -v -p codesigning "$keychain_path" | awk -F '"' '/Developer ID Application/ { print $2; exit }')"
          if [ -z "$identity" ]; then
            echo "No Developer ID Application identity found in APPLE_CERTIFICATE." >&2
            security find-identity -v -p codesigning "$keychain_path" >&2
            exit 1
          fi

          echo "APPLE_SIGNING_IDENTITY=$identity" >> "$GITHUB_ENV"

      - name: Build Windows portable app
        if: matrix.family == 'windows'
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          npm run tauri:portable
          $version = "${{ steps.package.outputs.version }}"
          $output = "kmd_${version}_${{ matrix.portableName }}-portable.exe"
          Copy-Item -LiteralPath "src-tauri/target/release/kmd.exe" -Destination $output -Force

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: v__VERSION__
          releaseName: "kmd v__VERSION__"
          releaseBody: "Portable downloads are preferred: use the macOS Apple Silicon .dmg or .app.zip, the macOS Intel .dmg or .app.zip, or the Windows portable .exe. Installer and updater artifacts are attached for users who want them."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

      - name: Package macOS portable app
        if: matrix.family == 'macos'
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          version="${{ steps.package.outputs.version }}"
          output="kmd_${version}_${{ matrix.portableName }}-portable.app.zip"
          app_path="$(find src-tauri/target -type d -name '*.app' -path '*/release/bundle/macos/*' | head -n 1)"
          if [ -z "$app_path" ]; then
            echo "No macOS .app bundle found under src-tauri/target." >&2
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "$app_path"

          notary_zip="$RUNNER_TEMP/kmd-${{ matrix.portableName }}-notary.zip"
          ditto -c -k --keepParent "$app_path" "$notary_zip"
          xcrun notarytool submit "$notary_zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$app_path"
          xcrun stapler validate "$app_path"
          spctl --assess --type execute --verbose=4 "$app_path"

          ditto -c -k --keepParent "$app_path" "$output"

      - name: Upload portable release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.package.outputs.version }}
          files: |
            kmd_*_${{ matrix.portableName }}-portable.exe
            kmd_*_${{ matrix.portableName }}-portable.app.zip
          fail_on_unmatched_files: false

      - name: Delete Apple signing keychain
        if: always() && matrix.family == 'macos'
        shell: bash
        run: security delete-keychain "$RUNNER_TEMP/kmd-signing.keychain-db" || true
